<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mii Ideas</title>
    <link href="style.css" rel="stylesheet" type="text/css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <audio loop preload="auto" id="wii-u-music">
        <source src="https://lambda.vgmtreasurechest.com/soundtracks/wii-u-system-audio-background-music/aovmwxzf/25.%20eShop%20-%20Settings.mp3" type="audio/mpeg" />
    </audio>
    <div class="topbar">
        <h1>Suggestion forms</h1>
    </div>
    <div id="relative">
        <div class="green-content">
            <!-- modify this form HTML and place wherever you want your form -->
            <form action="https://formspree.io/f/mzdyrraq"
                  method="POST">
                <label>
                    Your email:
                    <input type="email" name="email" required>
                </label>
                <hr />
                <br />
                <label>
                    Your message:
                    <textarea name="message" required></textarea>
                </label>
                <!-- your other form fields go here -->
                <button type="submit">Send</button>
            </form>
        </div>
    </div>
    <div class="bottom-left-footer">
        <label class="custom-checkbox" for="play-pause">
            <input type="checkbox" id="play-pause" />
            <span class="checkmark" id="play-pause-text"></span>
        </label>
        <a href="https://discord.gg/wEd45x7kts"><img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/discord-white-icon.png" alt="discord" /></a>
        <div class="btn-suggestion" onclick="window.location.href='https://cannedfart.github.io/mii-ideas/'">
            <p>Send a suggestion</p>
        </div>
        <p>
            @cannedfart
            <script>document.write(new Date().getFullYear())</script>
        </p>
    </div>
    <script type="text/javascript" src="music.js"></script>
    <script>validate(); typeOfThing();</script>
</body>
</html>
