<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mii Ideas</title>
    <link href="style.css" rel="stylesheet" type="text/css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
  </head>
  <body>
      <audio loop preload="auto" id="wii-u-music">
          <source src="https://lambda.vgmtreasurechest.com/soundtracks/wii-u-system-audio-background-music/nfpitvwv/48.%20Mii%20Maker%20-%20Menu%20%28Gamepad%29.mp3" type="audio/mpeg" />
      </audio>
      <div class="topbar">
          <h1>Get some ideas for your Mii!</h1>
      </div>
      <div id="relative">
          <div class="green-content">
              <h1>Get a celebrity or Video Game character to create:</h1>
              <label for="select">
                  Select type:
              </label>
              <select required id="select" onclick="typeOfThing()">
                  <option value="">--Choose an option--</option>
                  <option>Celebrity</option>
                  <option>Video Game</option>
                  <option>History</option>
              </select>
              <div class="btn" onclick="typeOfGenre()">
                  <p id="replace-txt">Get Mii Idea</p>
              </div>
          </div>
          <div id="idea"></div>
      </div>
      <div class="bottom-left-footer">
          <label class="custom-checkbox" for="play-pause">
              <input type="checkbox" id="play-pause" />
              <span class="checkmark" id="play-pause-text"></span>
          </label>
          <a href="https://discord.gg/wEd45x7kts"><img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/discord-white-icon.png" alt="discord" /></a>
          <div class="btn-suggestion" onclick="window.location.href='https://mii-ideas.neocities.org/submission/'">
              <p>Send a suggestion</p>
          </div>
          <p>@cannedfart <script>document.write(new Date().getFullYear())</script></p>
      </div>
      <script type="text/javascript" src="music.js"></script>
      <script type="text/javascript" src="type.js"></script>
      <script type="text/javascript" src="fetch.js"></script>
      <script>validate(); typeOfThing();</script>
  </body>
</html>
