      - name: items
        label: TV Characters
        type: list
        fields:
          - { name: first_name, label: First Name, type: string }
          - { name: last_name, label: Last Name, type: string }
          - { name: id, label: ID, type: string }
          - { name: image, label: Image, type: string }

  - name: videogames
    label: Video Games
    type: file
    path: json/videogames.json
    fields:
      - name: items
        label: Game Characters
        type: list
        fields:
          - { name: first_name, label: First Name, type: string }
          - { name: last_name, label: Last Name, type: string }
          - { name: id, label: ID, type: string }
          - { name: image, label: Image, type: string }

actions:
